<section id="contact">
  <div class="contact-grid">
    <div class="contact_intro">
      <div class="highlights">
        Say
        <div class="tilt">
          <span>h</span>
          <span>e</span>
          <span>l</span>
          <span>l</span>
          <span>o</span>
          <span>!</span>
        </div>
        Contact me.
      </div>
    </div>

    <!-- EMAIL FORM -->
    <form (submit)="sendEmail($event)" class="form-card">
      <div class="my-2">
        <label for="name" class="form-label mainfont h3">Name*</label>
        <input type="text" name="name" class="form-control border border-3 border-dark" id="name" placeholder="">
      </div>
      <div class="my-2">
        <label for="email" class="form-label mainfont h3">Email*</label>
        <input type="email" name="email" class="form-control border border-3 border-dark" id="email" placeholder="">
      </div>
      <div class="my-2">
        <label for="message" class="form-label mainfont h3">Message</label>
        <textarea name="message" class="form-control border border-3 border-dark" style="height: 80px" aria-label="With textarea"></textarea>
      </div>
      <div class="my-4">
        <input type="submit" value="Send" class="btn btn-dark fs-4 mainfont" style="width: 100%;">
      </div>
    </form>
